name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # حدثناها لـ v4

      # إعداد الـ Backend
      - name: Set up Node.js for Backend
        uses: actions/setup-node@v4  # حدثناها لـ v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json' # التأكد من المسار بـ ./

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install

      # إعداد الـ Frontend
      - name: Set up Node.js for Frontend
        uses: actions/setup-node@v4  # حدثناها لـ v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json' # التأكد من المسار بـ ./

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Validate docker-compose syntax
        run: docker-compose config -q
